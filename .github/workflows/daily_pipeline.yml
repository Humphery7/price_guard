name: Daily Competitor Scrapers

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r competitors/requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Mano Scraper
        run: python competitors/scrapers/mano_scraper.py
        continue-on-error: true

      - name: Run Chowdeck Scraper
        run: python competitors/scrapers/chowstore_scraper.py
        continue-on-error: true

      - name: Pipeline Summary
        run: |
          echo "═══════════════════════════════"
          echo "Scraping Complete"
          echo "Time: $(date -u)"
          echo "═══════════════════════════════"